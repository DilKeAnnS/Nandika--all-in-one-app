            padding: 16px 12px 30px;
            display: flex;
            justify-content: center;
        }

            width: 100%;
            background: #ffffff;

            position: relative;
        }

            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;

            gap: 12px;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .app-logo {
            background: linear-gradient(145deg, #1a3a6b, #2a5298);
            width: 50px;
            height: 50px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 26px;
            box-shadow: 0 6px 16px rgba(26, 67, 113, 0.25);
        }

        .header-title h1 {
            font-size: 22px;
            font-weight: 700;
            color: #0A1E3C;
            letter-spacing: -0.5px;
        }

        .header-title p {
            font-size: 13px;
            color: #5f7a9a;
            font-weight: 500;
        }

        .header-actions {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .search-box {
            background: #f2f7ff;
            border-radius: 40px;
            padding: 10px 18px;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid #dbe6f7;
            min-width: 200px;
        }

        .search-box i {
            color: #2a5298;
        }

        .search-box input {
            border: none;
            background: transparent;
            outline: none;
            font-size: 14px;
            width: 100%;
        }

        .filter-btn {
            background: #1e3c72;
            color: white;
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 13px;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
        }

        .filter-btn:hover {
            background: #14315c;
            transform: scale(1.02);
        }

        /* ----- CATEGORY TABS ----- */
        .category-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 24px;
            border-bottom: 2px solid #eef4fd;
            padding-bottom: 12px;
        }

        .category-tab {
            padding: 8px 18px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 13px;
            background: #f4f8ff;
            color: #41587a;
            cursor: pointer;
            border: 1px solid transparent;
            transition: 0.2s;
        }

        .category-tab:hover {
            background: #e3edfc;
        }

        .category-tab.active {
            background: #1e3c72;
            color: white;
            border-color: #1e3c72;
        }

        .category-tab .count {
            background: rgba(255, 255, 255, 0.2);
            padding: 1px 10px;
            border-radius: 20px;
            font-size: 11px;
            margin-left: 6px;
        }

        .category-tab.active .count {
            background: rgba(255, 255, 255, 0.25);
        }

        /* ----- USER TYPE GRID ----- */
        .user-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 18px;
            margin-bottom: 30px;
        }

        .user-card {
            background: #ffffff;
            border-radius: 24px;
            padding: 18px 16px 16px;
            border: 1px solid #ecf2fd;
            box-shadow: 0 4px 12px rgba(0, 20, 40, 0.04);
            transition: all 0.2s ease;
            cursor: pointer;
            position: relative;
        }

        .user-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 32px rgba(26, 67, 113, 0.10);
            border-color: #b6cff0;
        }

        .user-card:active {
            transform: scale(0.97);
        }

        .user-card .badge-cat {
            position: absolute;
            top: 12px;
            right: 12px;
            font-size: 10px;
            font-weight: 700;
            padding: 3px 12px;
            border-radius: 30px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .badge-professional { background: #e0f0e8; color: #1b6b4a; }
        .badge-institutional { background: #fce9e9; color: #a53f3f; }
        .badge-research { background: #f3e8fd; color: #6b3f8a; }
        .badge-social { background: #fef3de; color: #a76f2a; }
        .badge-specialized { background: #ddf0fc; color: #1c6f8f; }

        .user-card .icon-large {
            font-size: 32px;
            margin-bottom: 8px;
            display: block;
        }

        .user-card h3 {
            font-size: 16px;
            color: #0A1E3C;
            margin-bottom: 2px;
        }

        .user-card .tagline {
            font-size: 12px;
            color: #5f7a9a;
            margin-bottom: 8px;
        }

            flex-wrap: wrap;
            gap: 4px;
            margin-top: 8px;
        }

            background: #f4f8ff;
            font-size: 10px;
            padding: 2px 10px;
            border-radius: 20px;
            color: #1f3a6b;
        }

            color: white;
            border: none;
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.15s;
            width: 100%;
        }

            background: #f8fbff;
            border-radius: 28px;
            padding: 24px 22px;
            margin-top: 10px;
            border: 1px solid #e5edfa;
            display: none;
            animation: fadeSlide 0.3s ease;
        }

            display: block;
        }

            from { opacity: 0; transform: translateY(12px); }

                padding: 6px 14px;

            .user-grid {

            }
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
            .api-status {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }

            .user-grid {
                grid-template-columns: 1fr;
            }

                gap: 8px;

</head>

    // ------------------------------------------------------------
    // RENDER FUNCTIONS
    // ------------------------------------------------------------
    let currentCategory = 'all';
    let currentSearch = '';
    let activeUserId = null;

    function renderUsers() {
        const grid = document.getElementById('userGrid');
        const filtered = userTypes.filter(u => {
            const matchCat = currentCategory === 'all' || u.category === currentCategory;
            const matchSearch = u.name.toLowerCase().includes(currentSearch.toLowerCase()) ||
                                u.tagline.toLowerCase().includes(currentSearch.toLowerCase()) ||
                                u.features.some(f => f.toLowerCase().includes(currentSearch.toLowerCase()));
            return matchCat && matchSearch;
        });

        if (filtered.length === 0) {
            grid.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:40px; color:#5f7a9a;">
                                <i class="fas fa-search" style="font-size:40px; display:block; margin-bottom:12px;"></i>
                                No user types found. Try a different search or category.
                            </div>`;
            return;
        }

        grid.innerHTML = filtered.map(u => `
            <div class="user-card" onclick="openDashboard(${u.id})" data-id="${u.id}">
                <span class="badge-cat badge-${u.category}">${u.category}</span>
                <span class="icon-large">${u.icon}</span>
                <h3>${u.name}</h3>
                <div class="tagline">${u.tagline}</div>
                <div class="features-preview">
                    ${u.features.map(f => `<span>${f}</span>`).join('')}
                </div>
                <button class="view-btn" onclick="event.stopPropagation(); openDashboard(${u.id})">
                    <i class="fas fa-arrow-right"></i> View Dashboard
                </button>
            </div>
        `).join('');
    }

    function openDashboard(id) {
        const user = userTypes.find(u => u.id === id);
        if (!user) return;
        activeUserId = id;

        document.getElementById('dashTitle').textContent = `${user.icon} ${user.name}`;
        document.getElementById('dashSubtitle').textContent = `${user.tagline} · ${user.features.join(' · ')}`;

        const grid = document.getElementById('dashGrid');
        grid.innerHTML = user.dashboard.map(d => `
            <div class="dash-card">
                <div class="dash-icon">${d.icon}</div>
                <h4>${d.title}</h4>
                <ul>
                    ${d.items.map(item => `<li><i class="fas fa-check-circle"></i> ${item}</li>`).join('')}
                </ul>
                <button class="action-btn" onclick="event.stopPropagation(); alert('🔗 Navigating to ${d.title}...')">
                    <i class="fas fa-arrow-right"></i> Explore
                </button>
            </div>
        `).join('');

        document.getElementById('dashboardPanel').classList.add('active');
        document.getElementById('dashboardPanel').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function closeDashboard() {
        document.getElementById('dashboardPanel').classList.remove('active');
        activeUserId = null;
    }

    // ------------------------------------------------------------
    // FILTER FUNCTIONS
    // ------------------------------------------------------------
    function filterCategory(cat) {
        currentCategory = cat;
        document.querySelectorAll('.category-tab').forEach(t => t.classList.remove('active'));
        document.querySelector(`.category-tab[data-cat="${cat}"]`).classList.add('active');
        renderUsers();
    }

    function filterUsers() {
        currentSearch = document.getElementById('userSearch').value;
        renderUsers();
    }

    function resetFilters() {
        document.getElementById('userSearch').value = '';
        currentSearch = '';
        filterCategory('all');
    }

    // ------------------------------------------------------------
    // SYNC FUNCTION (simulated central data API)
    // ------------------------------------------------------------
    function syncData() {
        const btn = document.querySelector('.sync-btn');
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Syncing...';
        btn.disabled = true;

        setTimeout(() => {
            document.getElementById('syncStatus').textContent = '✅ All user data synced to Central Hub';
            document.getElementById('dataCount').textContent = userTypes.length;
            btn.innerHTML = '<i class="fas fa-check"></i> Synced';
            btn.disabled = false;
            setTimeout(() => {
                btn.innerHTML = '<i class="fas fa-sync-alt"></i> Sync Now';
            }, 1500);
        }, 1200);
    }

    // ------------------------------------------------------------
    // INIT
    // ------------------------------------------------------------
    renderUsers();

    // Auto-sync on load
    setTimeout(syncData, 500);
</script>
